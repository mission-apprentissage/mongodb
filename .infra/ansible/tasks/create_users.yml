---

- name: "Create role any"
  include_tasks: create_role.yml
  vars:
    role:
      name: "any"
      database: "admin"
      privileges:
        - resource:
            anyResource: true
          actions: [anyAction]
      roles: []

- name: "Create custom roles"
  include_tasks: create_role.yml
  loop: "{{roles}}"
  loop_control:
    loop_var: role
  when: "roles | default('') | length > 0"

- name: "Create users"
  include_tasks: create_user.yml
  loop: "{{users}}"
  loop_control:
    loop_var: user

- name: "Create root user"
  include_tasks: create_user.yml
  vars:
    user:
      name: "root"
      password: "{{root}}"
      database: "admin"
      roles:
        - role: "root"
          db: 'admin'

- name: "Create backup user"
  include_tasks: create_user.yml
  vars:
    user:
      name: "backup"
      password: "{{backup}}"
      database: "admin"
      roles:
        - role: "any"
          db: 'admin'

- name: "Create pmm user"
  include_tasks: create_user.yml
  vars:
    user:
      name: "pmm"
      password: "{{pmm}}"
      database: "admin"
      roles:
        - role: "any"
          db: 'admin'

- name: "Check mongod version (requis >= 8.2 pour le rôle searchCoordinator)"
  ansible.builtin.shell:
    cmd: "/opt/app/scripts/mongo.sh --quiet --eval 'db.version()'"
  register: mongot_mongod_version
  changed_when: false
  when: mongot_enable | default(false) | bool

- name: "Vérifier que mongod >= 8.2 avant de créer mongotUser"
  ansible.builtin.assert:
    that:
      - mongot_mongod_version.stdout | trim is version('8.2', '>=')
    fail_msg: >-
      mongod {{ mongot_mongod_version.stdout | trim }} détecté sur ce nœud, mais le rôle
      searchCoordinator nécessite mongod >= 8.2. Terminez le rollout de l'upgrade (voir
      docs/deploy/upgrade.md) avant de déployer mongot sur ce nœud.
  when: mongot_enable | default(false) | bool

- name: "Create mongot user"
  include_tasks: create_user.yml
  when: mongot_enable | default(false) | bool
  vars:
    user:
      name: "mongotUser"
      password: "{{ mongot }}"
      database: "admin"
      roles:
        - role: "searchCoordinator"
          db: 'admin'
