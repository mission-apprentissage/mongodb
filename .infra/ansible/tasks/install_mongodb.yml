---
- name: "Import the public key used by the package management system"
  get_url:
    url: "https://www.mongodb.org/static/pgp/server-{{ mongodb_pgp_key_epoch | default('8.0') }}.asc"
    dest: "/etc/apt/keyrings/mongodb-server-{{ mongodb_pgp_key_epoch | default('8.0') }}.asc"

- name: "Create a list file for MongoDB"
  apt_repository:
    repo: "deb [ arch=amd64,arm64 signed-by=/etc/apt/keyrings/mongodb-server-{{ mongodb_pgp_key_epoch | default('8.0') }}.asc ] https://repo.mongodb.org/apt/ubuntu noble/mongodb-org/{{ mongodb_version | default('8.0') }} multiverse"
    state: present

- name: Install MongoDB package
  apt:
    name: mongodb-org*
    state: latest
    update_cache: yes

- name: "Setup numactl"
  include_tasks: ./tweaks/numa.yml

- name: "Setup ulimit"
  include_tasks: ./tweaks/ulimit.yml

- name: "Setup Network"
  include_tasks: ./tweaks/network.yml

- name: "Create log directory"
  ansible.builtin.file:
    path: "/var/log/mongodb"
    state: directory
    mode: "0700"
    owner: mongodb
    recurse: yes

- name: "Create log file"
  ansible.builtin.file:
    path: "/var/log/mongodb/mongod.log"
    state: touch
    mode: "0600"
    owner: mongodb
    group: mongodb

- name: "MongoDB service configuration"
  ansible.builtin.copy:
    src:  "{{ inventory_dir }}/../files/configs/mongodb/mongod.service"
    dest: "/etc/systemd/system/mongod.service"
    mode: "0644"
    owner: root
  notify:
    - Reload Daemon
    - Restart MongoDB

- name: "Disable Transparent Huge Pages (THP)"
  ansible.builtin.copy:
    src:  "{{ inventory_dir }}/../files/configs/mongodb/disable-transparent-huge-pages.service"
    dest: "/etc/systemd/system/disable-transparent-huge-pages.service"
    mode: "0644"
    owner: root
  notify:
    - Reload Daemon
    - Restart THP
